name: Windows MSI

on:
  push:
    tags:
      - 'v*'

jobs:
  msi:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          
      - name: Build Binary
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          go build -ldflags "-X main.version=$version"
          
      - name: Install WiX Toolset
        run: |
          curl -L -o wix.zip https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip
          Expand-Archive wix.zip -DestinationPath wix
          echo "$pwd\wix" | Out-File -FilePath $env:GITHUB_PATH -Append
          
      - name: Install go-msi
        run: |
          go install github.com/mh-cbon/go-msi@latest
          
      - name: Build MSI
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          mkdir build
          Copy-Item waitup.exe build\
          cd build
          go-msi make --msi waitup-$version-windows-amd64.msi --version $version
          Move-Item waitup-$version-windows-amd64.msi ..
          cd ..
          
      - name: Upload MSI
        uses: softprops/action-gh-release@v1
        with:
          files: waitup-*-windows-amd64.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 